<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=device-width, initial-scale=1.0">
  <title>실시간 가계부 대시보드</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    /* 모달창 스타일 가이드 및 애니메이션 */
    .modal {
      transition: opacity 0.25s ease;
    }
    body.modal-active {
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 relative min-h-screen pb-12">

  <!-- [요구사항 3] 최상단 우측 톱니바퀴 모양 설정 버튼 -->
  <button onclick="openSettingsModal()" class="absolute top-6 right-6 text-2xl text-gray-500 hover:text-gray-800 transition-colors duration-200 focus:outline-none" title="환경설정">
    ⚙️
  </button>

  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- 헤더 세션 -->
    <header class="mb-8 text-center">
      <h1 id="titleLedgerName" class="text-3xl font-bold text-gray-900 mb-2">우리집 실시간 가계부</h1>
      <p class="text-sm text-gray-500">구글 스프레드시트 연동 라이브 데이터 대시보드</p>
    </header>

    <!-- 상단 요약 카드 대시보드 (자산 통계) -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <div class="bg-white p-5 rounded-xl shadow-xs border border-gray-100 text-center">
        <span class="text-xs font-semibold text-green-500 uppercase tracking-wider">이번 달 총 수입</span>
        <h3 id="statIncome" class="text-2xl font-bold mt-1 text-gray-900">0원</h3>
      </div>
      <div class="bg-white p-5 rounded-xl shadow-xs border border-gray-100 text-center">
        <span class="text-xs font-semibold text-red-500 uppercase tracking-wider">이번 달 총 지출</span>
        <h3 id="statExpense" class="text-2xl font-bold mt-1 text-gray-900">0원</h3>
      </div>
      <div class="bg-white p-5 rounded-xl shadow-xs border border-gray-100 text-center">
        <span class="text-xs font-semibold text-blue-500 uppercase tracking-wider">현재 잔액 상태</span>
        <h3 id="statBalance" class="text-2xl font-bold mt-1 text-gray-900">0원</h3>
      </div>
    </section>

    <!-- 입력 폼 및 내역 리스트 레이아웃 -->
    <div class="grid grid-cols-1 gap-8">
      
      <!-- 데이터 입력/수정 폼 카드 -->
      <section class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100">
        <h2 id="formPurpose" class="text-lg font-bold text-gray-900 mb-4">✨ 가계부 내역 입력하기</h2>
        <form id="transactionForm" onsubmit="handleFormSubmit(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="hidden" id="editItemId">
          
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">날짜 선택</label>
            <input type="date" id="txDate" required class="w-full border border-gray-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">거래 구분</label>
            <select id="txType" class="w-full border border-gray-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
              <option value="expense">지출 (-)</option>
              <option value="income">수입 (+)</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">작성자</label>
            <select id="txUser" class="w-full border border-gray-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
              <!-- 환경설정 유저 데이터가 동적으로 주입됩니다 -->
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">사용 내역명</label>
            <input type="text" id="txTitle" placeholder="예: 마트 장보기, 급여" required class="w-full border border-gray-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">금액 (원)</label>
            <input type="number" id="txAmount" placeholder="숫자만 입력" required class="w-full border border-gray-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">자산 / 결제카드</label>
            <select id="txCard" class="w-full border border-gray-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
              <!-- 동적 카드 주입 -->
            </select>
          </div>
          <div class="md:col-span-2">
            <label class="block text-xs font-medium text-gray-600 mb-1">카테고리 분류</label>
            <select id="txCategory" class="w-full border border-gray-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
              <!-- 동적 카테고리 주입 -->
            </select>
          </div>
          
          <div class="md:col-span-2 flex gap-2 mt-2">
            <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg text-sm transition shadow-xs cursor-pointer">저장하기</button>
            <button type="button" id="cancelEditBtn" onclick="resetForm()" class="hidden bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium px-4 py-2.5 rounded-lg text-sm transition cursor-pointer">수정 취소</button>
          </div>
        </form>
      </section>

      <!-- [요구사항 1] 데이터 리스트 및 수정/삭제 인터페이스 -->
      <section class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100">
        <h2 class="text-lg font-bold text-gray-900 mb-4">📊 거래 내역 리스트</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-left text-sm text-gray-600">
            <thead class="bg-gray-50 text-xs font-semibold text-gray-700 uppercase tracking-wider">
              <tr>
                <th class="p-3">날짜</th>
                <th class="p-3">구분</th>
                <th class="p-3">작성자</th>
                <th class="p-3">내역</th>
                <th class="p-3 text-right">금액</th>
                <th class="p-3">자산카드</th>
                <th class="p-3">카테고리</th>
                <th class="p-3 text-center">관리</th>
              </tr>
            </thead>
            <tbody id="transactionTableBody" class="divide-y divide-gray-100">
              <!-- JavaScript 호출을 통해 실시간 내역 행이 추가됩니다 -->
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <!-- 환경설정 모달창 구조 레이아웃 -->
  <div id="settingsModal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
    <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50"></div>
    <div class="modal-container bg-white w-11/12 md:max-w-xl mx-auto rounded-2xl shadow-2xl z-50 overflow-y-auto max-h-[90vh]">
      
      <!-- 모달 헤더 -->
      <div class="modal-content py-4 text-left px-6 border-b border-gray-100 flex justify-between items-center bg-gray-50">
        <p class="text-lg font-bold text-gray-800">⚙️ 가계부 환경설정 마스터</p>
        <div onclick="closeSettingsModal()" class="modal-close cursor-pointer text-gray-400 hover:text-gray-700 text-xl">＆times;</div>
      </div>

      <!-- 모달 바디 -->
      <div class="p-6 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-700 mb-1">가계부 타이틀 명칭</label>
          <input type="text" id="cfgLedgerName" class="w-full border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <!-- [요구사항 4] 고정값 현상이 완벽히 해결된 사용자 입력 필드 -->
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-700 mb-1">사용자 1 명칭</label>
            <input type="text" id="cfgUser1" placeholder="예: 남편" class="w-full border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-700 mb-1">사용자 2 명칭</label>
            <input type="text" id="cfgUser2" placeholder="예: 아내" class="w-full border border-gray-200 rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>

        <!-- [요구사항 2] 카드를 추가하고 순서를 자유롭게 정렬하는 관리 패널 -->
        <div class="border border-gray-100 p-4 rounded-xl bg-gray-50">
          <label class="block text-xs font-bold text-gray-800 mb-2">💳 결제 자산카드 순서 관리</label>
          <div class="flex gap-2 mb-3">
            <input type="text" id="newCardInput" placeholder="새 카드 이름 입력" class="flex-1 border border-gray-200 bg-white rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="button" onclick="addNewCardToList()" class="bg-gray-800 text-white text-xs px-3 py-2 rounded-lg font-medium hover:bg-gray-900 transition cursor-pointer">추가</button>
          </div>
          <ul id="cfgCardListContainer" class="space-y-1 max-h-40 overflow-y-auto bg-white border border-gray-200 rounded-lg p-2">
            <!-- 동적 카드 목록 엘리먼트 렌더링 -->
          </ul>
          <p class="text-[11px] text-gray-400 mt-1">▲/▼ 버튼을 눌러 순서를 바꾸면 가계부 입력 폼 배열 순서도 자동으로 동기화됩니다.</p>
        </div>

        <!-- 텔레그램 연동 토글 메타데이터 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 border-t border-gray-100 pt-3">
          <div class="md:col-span-2">
            <label class="block text-xs font-semibold text-gray-700 mb-1">텔레그램 토큰 (Token)</label>
            <input type="password" id="cfgTgToken" class="w-full border border-gray-200 rounded-lg p-2 text-sm focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-700 mb-1">챗 ID (Chat ID)</label>
            <input type="text" id="cfgTgChatId" class="w-full border border-gray-200 rounded-lg p-2 text-sm focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-700 mb-1">알림 전송 기능</label>
            <select id="cfgTgToggle" class="w-full border border-gray-200 rounded-lg p-2 text-sm focus:outline-none">
              <option value="ON">ON (활성화)</option>
              <option value="OFF">OFF (비활성화)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- [요구사항 6] 하단 버튼 영역 명칭을 '취소'에서 '닫기'로 명명 -->
      <div class="modal-footer py-3 px-6 bg-gray-50 border-t border-gray-100 flex justify-end gap-2">
        <button onclick="closeSettingsModal()" class="px-4 py-2 bg-gray-300 hover:bg-gray-400 text-gray-700 text-xs font-medium rounded-lg transition cursor-pointer">닫기</button>
        <button onclick="saveAllSettingsData()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium rounded-lg transition shadow-xs cursor-pointer">설정 저장</button>
      </div>
    </div>
  </div>

  <!-- 비동기 통신 및 상태 제어 엔진 스크립트 -->
  <script>
    // 상태 관리용 변수 풀 생성
    let appState = {
      items: [],
      categories: [],
      cards: [],
      settings: {}
    };

    // 로컬 스토리지에서 구글 웹 앱 API 주소 추출
    let API_URL = localStorage.getItem("googleWebAppsUrl");
    if (!API_URL) {
      // 로컬 스토리지에 없는 경우 초기 등록 유도
      const inputUrl = prompt("구글 웹 앱 배포 URL 주소를 입력해 주세요:");
      if (inputUrl) {
        localStorage.setItem("googleWebAppsUrl", inputUrl.trim());
        API_URL = inputUrl.trim();
      }
    }

    // 문서 초기 진입 시 데이터 호출
    document.addEventListener("DOMContentLoaded", function() {
      // 초기 오늘 날짜 기본 매핑
      document.getElementById("txDate").value = new Date().toISOString().substring(0, 10);
      fetchDashboardData();
    });

    /**
     * 구글 시트 백엔드 데이터셋 수집 파이프라인
     */
    function fetchDashboardData() {
      if (!API_URL) return;
      
      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          appState.items = data.items || [];
          appState.categories = data.categories || [];
          appState.cards = data.cards || [];
          appState.settings = data.settings || {};
          
          renderAppUI();
        })
        .catch(err => console.error("데이터 동기화 실패:", err));
    }

    /**
     * 가계부 전체 UI 렌더링 메인 함수
     */
    function renderAppUI() {
      // 타이틀 동기화
      document.getElementById("titleLedgerName").innerText = appState.settings.ledgerName || "우리집 실시간 가계부";
      
      // 작성자 유저 셀렉트박스 동적 주입
      const userSelect = document.getElementById("txUser");
      userSelect.innerHTML = "";
      const u1 = appState.settings.user1 || "남편";
      const u2 = appState.settings.user2 || "아내";
      userSelect.innerHTML += `<option value="${u1}">${u1}</option>`;
      userSelect.innerHTML += `<option value="${u2}">${u2}</option>`;

      // 카드 셀렉트박스 렌더링
      const cardSelect = document.getElementById("txCard");
      cardSelect.innerHTML = appState.cards.map(c => `<option value="${c}">${c}</option>`).join("");

      // 카테고리 셀렉트박스 렌더링
      const catSelect = document.getElementById("txCategory");
      catSelect.innerHTML = appState.categories.map(c => `<option value="${c}">${c}</option>`).join("");

      // 요약 자산 지표 통계 연산
      let totalIncome = 0;
      let totalExpense = 0;
      appState.items.forEach(item => {
        if (item.type === "income") totalIncome += item.amount;
        else totalExpense += item.amount;
      });
      
      document.getElementById("statIncome").innerText = totalIncome.toLocaleString() + "원";
      document.getElementById("statExpense").innerText = totalExpense.toLocaleString() + "원";
      document.getElementById("statBalance").innerText = (totalIncome - totalExpense).toLocaleString() + "원";

      // [요구사항 1] 리스트 동적 그리기 및 데이터 바인딩
      const tbody = document.getElementById("transactionTableBody");
      tbody.innerHTML = "";
      
      // 최신 등록 내역이 최상단에 올라오도록 역순 정렬
      const sortedItems = [...appState.items].sort((a, b) => new Date(b.date) - new Date(a.date));
      
      if(sortedItems.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="p-8 text-center text-gray-400 text-xs">등록된 내역이 없습니다. 첫 내역을 입력해 보세요!</td></tr>`;
        return;
      }

      sortedItems.forEach(item => {
        const tr = document.createElement("tr");
        tr.className = "hover:bg-gray-50/80 transition-colors";
        
        const cleanDate = item.date ? item.date.toString().substring(0, 10) : "";
        const typeBadge = item.type === "income" 
          ? `<span class="bg-green-100 text-green-700 text-[11px] font-bold px-2 py-0.5 rounded-full">수입</span>` 
          : `<span class="bg-red-100 text-red-700 text-[11px] font-bold px-2 py-0.5 rounded-full">지출</span>`;
        
        tr.innerHTML = `
          <td class="p-3 text-xs whitespace-nowrap">${cleanDate}</td>
          <td class="p-3">${typeBadge}</td>
          <td class="p-3 text-xs font-medium text-gray-700">${item.user || ""}</td>
          <td class="p-3 font-medium text-gray-900">${item.title}</td>
          <td class="p-3 text-right font-semibold text-xs ${item.type === 'income' ? 'text-green-600' : 'text-red-600'}">
            ${item.type === 'income' ? '+' : '-'}${item.amount.toLocaleString()}원
          </td>
          <td class="p-3 text-xs text-gray-500">${item.card}</td>
          <td class="p-3 text-xs"><span class="bg-gray-100 text-gray-600 px-2 py-1 rounded-md">${item.category}</span></td>
          <td class="p-3 text-center whitespace-nowrap">
            <button onclick="activateEditMode(${item.id})" class="text-blue-600 hover:text-blue-800 text-xs font-semibold mr-2 transition cursor-pointer">수정</button>
            <button onclick="deleteTransactionItem(${item.id})" class="text-red-500 hover:text-red-700 text-xs font-semibold transition cursor-pointer">삭제</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    /**
     * [요구사항 1] 데이터 등록 및 수정 서브밋 통합 핸들러
     */
    function handleFormSubmit(event) {
      event.preventDefault();
      if (!API_URL) return;

      const editId = document.getElementById("editItemId").value;
      const payload = {
        action: editId ? "update" : "add",
        id: editId ? Number(editId) : Date.now(),
        date: document.getElementById("txDate").value,
        type: document.getElementById("txType").value,
        user: document.getElementById("txUser").value,
        title: document.getElementById("txTitle").value,
        amount: Number(document.getElementById("txAmount").value),
        card: document.getElementById("txCard").value,
        category: document.getElementById("txCategory").value
      };

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if(data.result === "success") {
          resetForm();
          fetchDashboardData();
        }
      })
      .catch(err => alert("전송 에러 발생: " + err));
    }

    /**
     * [요구사항 1] 수정 모드 활성화 및 입력 폼 역매핑
     */
    function activateEditMode(id) {
      const target = appState.items.find(i => i.id === id);
      if(!target) return;

      document.getElementById("editItemId").value = target.id;
      document.getElementById("txDate").value = target.date ? target.date.toString().substring(0, 10) : "";
      document.getElementById("txType").value = target.type;
      document.getElementById("txUser").value = target.user;
      document.getElementById("txTitle").value = target.title;
      document.getElementById("txAmount").value = target.amount;
      document.getElementById("txCard").value = target.card;
      document.getElementById("txCategory").value = target.category;

      document.getElementById("formPurpose").innerText = "✏️ 가계부 내역 수정 모드";
      document.getElementById("cancelEditBtn").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /**
     * [요구사항 1] 데이터 내역 삭제 처리 파이프라인
     */
    function deleteTransactionItem(id) {
      if(!confirm("정말 이 내역을 삭제하시겠습니까?\n월별 시트에서도 영구 삭제됩니다.")) return;
      if (!API_URL) return;

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "delete", id: id })
      })
      .then(res => res.json())
      .then(data => {
        if(data.result === "success") {
          fetchDashboardData();
        }
      });
    }

    function resetForm() {
      document.getElementById("editItemId").value = "";
      document.getElementById("transactionForm").reset();
      document.getElementById("txDate").value = new Date().toISOString().substring(0, 10);
      document.getElementById("formPurpose").innerText = "✨ 가계부 내역 입력하기";
      document.getElementById("cancelEditBtn").className = "hidden bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium px-4 py-2.5 rounded-lg text-sm transition cursor-pointer";
    }

    /**
     * 모달창 제어 로직 
     */
    function openSettingsModal() {
      // 세팅 인풋 밸류 매핑
      document.getElementById("cfgLedgerName").value = appState.settings.ledgerName || "";
      document.getElementById("cfgUser1").value = appState.settings.user1 || "";
      document.getElementById("cfgUser2").value = appState.settings.user2 || "";
      document.getElementById("cfgTgToken").value = appState.settings.telegramToken || "";
      document.getElementById("cfgTgChatId").value = appState.settings.telegramChatId || "";
      document.getElementById("cfgTgToggle").value = appState.settings.telegramToggle || "OFF";

      // 카드 관리 리스트 드로잉
      renderCardListInSettings();

      const modal = document.getElementById("settingsModal");
      modal.classList.remove("pointer-events-none");
      modal.classList.remove("opacity-0");
      document.body.classList.add("modal-active");
    }

    function closeSettingsModal() {
      const modal = document.getElementById("settingsModal");
      modal.classList.add("pointer-events-none");
      modal.classList.add("opacity-0");
      document.body.classList.remove("modal-active");
    }

    /**
     * [요구사항 2] 카드 환경설정 모달창 리스트 내부 렌더러
     */
    function renderCardListInSettings() {
      const container = document.getElementById("cfgCardListContainer");
      container.innerHTML = "";
      
      appState.cards.forEach((card, idx) => {
        const li = document.createElement("li");
        li.className = "flex justify-between items-center bg-gray-50 border border-gray-100 rounded-lg p-1.5 text-xs font-medium text-gray-700";
        li.innerHTML = `
          <span>${card}</span>
          <div class="flex gap-1">
            <button onclick="moveCardOrder(${idx}, 'up')" class="bg-white border border-gray-200 hover:bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded-sm font-bold cursor-pointer">▲</button>
            <button onclick="moveCardOrder(${idx}, 'down')" class="bg-white border border-gray-200 hover:bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded-sm font-bold cursor-pointer">▼</button>
            <button onclick="deleteCardFromList(${idx})" class="bg-red-50 hover:bg-red-100 text-red-600 px-1.5 py-0.5 rounded-sm ml-2 font-bold cursor-pointer">삭제</button>
          </div>
        `;
        container.appendChild(li);
      });
    }

    /**
     * [요구사항 2] 카드를 순서대로 위치 바꾸는 비즈니스 로직
     */
    function moveCardOrder(index, direction) {
      if(direction === "up" && index > 0) {
        let target = appState.cards[index - 1];
        appState.cards[index - 1] = appState.cards[index];
        appState.cards[index] = target;
      } else if(direction === "down" && index < appState.cards.length - 1) {
        let target = appState.cards[index + 1];
        appState.cards[index + 1] = appState.cards[index];
        appState.cards[index] = target;
      }
      renderCardListInSettings();
    }

    function addNewCardToList() {
      const input = document.getElementById("newCardInput");
      const value = input.value.trim();
      if(!value) return;
      if(appState.cards.includes(value)) {
        alert("이미 같은 이름의 자산카드가 목록에 존재합니다.");
        return;
      }
      appState.cards.push(value);
      input.value = "";
      renderCardListInSettings();
    }

    function deleteCardFromList(index) {
      appState.cards.splice(index, 1);
      renderCardListInSettings();
    }

    /**
     * [요구사항 4 & 5] 환경설정 및 유저이름(남편/아내) 연동 데이터 병렬 최종 저장 파이프라인
     */
    function saveAllSettingsData() {
      if(!API_URL) return;

      // 1. 앱 환경 메타데이터 환경 설정 세팅
      const settingsPayload = {
        action: "saveAppSettings",
        settings: {
          ledgerName: document.getElementById("cfgLedgerName").value.trim(),
          user1: document.getElementById("cfgUser1").value.trim() || "남편",
          user2: document.getElementById("cfgUser2").value.trim() || "아내",
          telegramToken: document.getElementById("cfgTgToken").value.trim(),
          telegramChatId: document.getElementById("cfgTgChatId").value.trim(),
          telegramToggle: document.getElementById("cfgTgToggle").value
        }
      };

      // 2. 카드 목록 리스트 정렬 순서 보존 세팅
      const cardsPayload = {
        action: "saveCards",
        cards: appState.cards
      };

      // 비동기 병렬 요청 처리를 통한 완벽한 시트 동기화 보장
      Promise.all([
        fetch(API_URL, { method: "POST", body: JSON.stringify(settingsPayload) }).then(r => r.json()),
        fetch(API_URL, { method: "POST", body: JSON.stringify(cardsPayload) }).then(r => r.json())
      ])
      .then(results => {
        if(results[0].result === "success" && results[1].result === "success") {
          // [요구사항 5] 최종 수정 알림 팝업 전송
          alert("업데이트가 정상적으로 완료되었습니다.");
          closeSettingsModal();
          fetchDashboardData(); // 변경된 최신 자산 설정 로드 연동
        } else {
          alert("설정 저장 과정에서 에러가 발생했습니다.");
        }
      })
      .catch(err => alert("네트워크 연결 실패: " + err));
    }
  </script>
</body>
</html>
