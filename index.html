<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 가계부</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; max-width: 500px; margin: auto; background: #f9f9f9; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .nav { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .nav button { width: 48%; background: #6c757d; }
    </style>
</head>
<body>

    <!-- 1. 초기 설정 화면 -->
    <div id="setup-screen" class="hidden">
        <h3>초기 설정</h3>
        <p>본인의 구글 웹 앱 URL을 입력하세요.</p>
        <input type="text" id="scriptUrlInput" placeholder="https://script.google.com/...">
        <button onclick="saveAndStart()">가계부 시작하기</button>
    </div>

    <!-- 2. 메인 앱 화면 -->
    <div id="app-screen" class="hidden">
        <div class="nav">
            <button onclick="showView('main')">가계부</button>
            <button onclick="showView('settings')">설정</button>
        </div>

        <div id="view-main">
            <h2 id="acc-title">가계부</h2>
            <div class="card">
                <input type="date" id="date">
                <input type="text" id="memo" placeholder="내용">
                <input type="number" id="amount" placeholder="금액">
                <button onclick="addExpense()">저장하기</button>
            </div>
            <div id="history-list"></div>
        </div>

        <div id="view-settings" class="hidden">
            <h3>앱 설정</h3>
            <label>가계부 이름</label>
            <input type="text" id="set-name">
            <label><input type="checkbox" id="set-noti"> 텔레그램 알림 사용</label>
            <input type="text" id="set-token" placeholder="봇 토큰">
            <input type="text" id="set-id" placeholder="채팅 ID">
            <button onclick="saveSettings()">설정 저장</button>
            <button onclick="logout()" style="background:#dc3545; margin-top:20px;">URL 초기화 (로그아웃)</button>
        </div>
    </div>

<script>
    const STORAGE_KEY = 'myWebAppsUrl';
    
    window.onload = () => {
        const url = localStorage.getItem(STORAGE_KEY);
        if (!url) document.getElementById('setup-screen').classList.remove('hidden');
        else {
            document.getElementById('app-screen').classList.remove('hidden');
            loadData();
        }
    };

    function saveAndStart() {
        const url = document.getElementById('scriptUrlInput').value;
        localStorage.setItem(STORAGE_KEY, url);
        location.reload();
    }

    function logout() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

    function showView(view) {
        document.getElementById('view-main').classList.toggle('hidden', view !== 'main');
        document.getElementById('view-settings').classList.toggle('hidden', view !== 'settings');
    }

    async function apiCall(action, payload = {}) {
        const res = await fetch(localStorage.getItem(STORAGE_KEY), {
            method: 'POST',
            body: JSON.stringify({ action, ...payload })
        });
        return await res.json();
    }

    async function loadData() {
        const data = await apiCall('getSettings');
        if (data.settings) {
            document.getElementById('acc-title').innerText = data.settings['가계부이름'] || '가계부';
            document.getElementById('set-name').value = data.settings['가계부이름'] || '';
            document.getElementById('set-noti').checked = data.settings['알림사용여부'] === 'true';
            document.getElementById('set-token').value = data.settings['텔레그램토큰'] || '';
            document.getElementById('set-id').value = data.settings['텔레그램ID'] || '';
        }
    }

    async function addExpense() {
        const payload = {
            date: document.getElementById('date').value,
            memo: document.getElementById('memo').value,
            amount: document.getElementById('amount').value
        };
        await apiCall('addExpense', payload);
        alert('저장되었습니다!');
        location.reload();
    }

    async function saveSettings() {
        const settings = {
            '가계부이름': document.getElementById('set-name').value,
            '알림사용여부': document.getElementById('set-noti').checked ? 'true' : 'false',
            '텔레그램토큰': document.getElementById('set-token').value,
            '텔레그램ID': document.getElementById('set-id').value
        };
        await apiCall('saveSettings', { settings });
        alert('설정이 저장되었습니다.');
    }
</script>
</body>
</html>
