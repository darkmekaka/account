<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가계부</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; margin: 0; padding-bottom: 20px; }
        /* 헤더 스타일 */
        .dark-header { background-color: #1a2533; color: white; padding: 20px; border-radius: 0 0 20px 20px; }
        .summary-box { display: flex; justify-content: space-between; margin-top: 15px; }
        .stat-item { color: #8198b5; font-size: 0.9rem; }
        .stat-value { color: #ff6b6b; font-size: 1.5rem; font-weight: bold; }
        /* 버튼 및 폼 스타일 */
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-group button { flex: 1; padding: 10px; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 5px; }
        .btn-group button.active { background: #007bff; color: white; border-color: #007bff; }
        .form-card { background: white; padding: 20px; margin: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .full-btn { background: #1a2533; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; margin-top: 10px; }
        /* 리스트 스타일 */
        .history-item { background: white; padding: 15px; margin: 10px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ff6b6b; }
    </style>
</head>
<body>

    <!-- 1. 다크 헤더 영역 -->
    <div class="dark-header">
        <h2>쑥잠이네 가계부</h2>
        <input type="month" id="monthPicker" style="background: #2c3e50; color: white; border: none; padding: 10px;">
        <div class="summary-box">
            <div><div class="stat-item">카드 결제 예정</div><div class="stat-value" style="color: #61dafb;">650,527원</div></div>
            <div><div class="stat-item">총 지출</div><div class="stat-value">985,727원</div></div>
        </div>
    </div>

    <!-- 2. 입력 폼 영역 -->
    <div class="form-card">
        <div class="btn-group">
            <button onclick="toggleActive(this, 'who')">남편</button>
            <button onclick="toggleActive(this, 'who')">아내</button>
        </div>
        <div class="btn-group">
            <button onclick="toggleActive(this, 'type')" class="active">수입</button>
            <button onclick="toggleActive(this, 'type')">지출</button>
        </div>
        <input type="date" id="date">
        <div style="display: flex; gap: 5px;">
            <input type="number" id="amount" placeholder="금액 (원)">
            <select id="card"><option>카드 선택</option></select>
        </div>
        <input type="text" id="memo" placeholder="사용 내역을 입력하세요">
        <button class="full-btn">가계부 등록하기</button>
    </div>

    <!-- 3. 리스트 영역 -->
    <h3 style="margin: 20px 15px;">7월 수입 지출 내역</h3>
    <div id="history-list">
        <div class="history-item">
            <div><strong>아내</strong> | 07-08 | 신한카드 | 교통비<br>친정갔다가 택시</div>
            <div style="color: #ff6b6b; font-weight: bold;">-12,800원</div>
        </div>
    </div>

<script>
    // 토글 버튼 선택 로직
    function toggleActive(btn, group) {
        document.querySelectorAll(`.btn-group button`).forEach(b => {
            // 같은 그룹 내의 버튼들만 처리하는 로직 추가 필요 (지금은 단순 예시)
            if(b.parentElement === btn.parentElement) b.classList.remove('active');
        });
        btn.classList.add('active');
    }
</script>
</body>
</html>
