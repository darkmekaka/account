<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가계부 앱</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        .hidden { display: none; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. 설정 화면 (처음 한 번만 사용) -->
    <div id="setup-screen" class="hidden">
        <h3>초기 설정</h3>
        <p>본인의 구글 앱 스크립트 웹 앱 URL을 입력해주세요.</p>
        <input type="text" id="scriptUrlInput" placeholder="https://script.google.com/...">
        <button onclick="saveAndStart()">가계부 시작하기</button>
    </div>

    <!-- 2. 실제 가계부 메인 화면 -->
    <div id="app-screen" class="hidden">
        <h2 id="display-accName">우리집 가계부</h2>
        <div class="card">
            <p>기록 화면이 여기에 들어갑니다.</p>
            <button onclick="logout()">설정 변경(URL 초기화)</button>
        </div>
    </div>

<script>
    const STORAGE_KEY = 'myWebAppsUrl';

    window.onload = async () => {
        const savedUrl = localStorage.getItem(STORAGE_KEY);
        
        if (!savedUrl) {
            // URL이 없으면 설정 화면 보여줌
            document.getElementById('setup-screen').classList.remove('hidden');
        } else {
            // URL이 있으면 앱 화면 보여줌
            document.getElementById('app-screen').classList.remove('hidden');
            loadAppData(savedUrl);
        }
    };

    // 저장하고 시작하기
    function saveAndStart() {
        const url = document.getElementById('scriptUrlInput').value;
        if (!url) return alert("URL을 입력해주세요.");
        localStorage.setItem(STORAGE_KEY, url);
        location.reload(); // 새로고침해서 앱 진입
    }

    // 설정 변경(로그아웃)
    function logout() {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
    }

    // 앱 데이터 로드 (서버 통신)
    async function loadAppData(url) {
        try {
            const res = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({ action: 'getSettings' })
            });
            const data = await res.json();
            if(data.settings) {
                document.getElementById('display-accName').innerText = data.settings['가계부이름'] || '우리집 가계부';
            }
        } catch (e) {
            alert("연결 오류: URL을 다시 확인해주세요.");
            logout(); // 오류 시 초기화
        }
    }
</script>
</body>
</html>
